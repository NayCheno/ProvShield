name: ProvShield CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test
        run: python artifact/scripts/run_smoke_test.py

      - name: Replay audit verifier (smoke)
        run: |
          # Generate a trace from smoke test, then replay
          python -c "
          from provshield import RuntimeMonitor, AuditLogger
          from provshield.labels import Integrity, Confidentiality
          monitor = RuntimeMonitor()
          ext = monitor.provenance_store.ingest('test', Integrity.EXTERNAL, Confidentiality.PUBLIC, 'web')
          try:
              monitor.check_and_execute(
                  {'tool_name': 'send_email', 'arguments': {'to': 'a@b.com', 'body': 'test'},
                   'argument_sources': {'body': [ext.object_id]}},
                  lambda call: 'sent')
          except PermissionError:
              pass
          monitor.audit_log.export_trace_jsonl('/tmp/test_trace.jsonl')
          "
          python tools/replay_audit.py --trace /tmp/test_trace.jsonl || true
